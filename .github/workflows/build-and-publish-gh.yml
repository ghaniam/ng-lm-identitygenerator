name: Publish Package to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  # Stage 1: Pre-release (Automatic, Private)
  pre-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.nbgv.outputs.VERSION }}
    environment:
      name: pre-release
      url: https://github.com/${{ github.repository }}/packages
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for versioning
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
      
      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Pack
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration ${{ env.CONFIGURATION }} --output package -p:PackageVersion=${{ steps.nbgv.outputs.VERSION }}

      - name: Publish to GitHub Packages (Pre-release)
        run: |
          dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./package/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate
      
      - name: Create GitHub Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.nbgv.outputs.VERSION }}"
          git tag "v$VERSION-pre-release"
          git push origin "v$VERSION-pre-release"
          gh release create "v$VERSION-pre-release" \
            --title "v$VERSION (Pre-release)" \
            --notes "Pre-release version $VERSION" \
            --prerelease \
            ./package/*.nupkg

  # Stage 2: Release (Manual Approval Required, Private)
  release:
    needs: pre-release
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/packages
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.pre-release.outputs.version }}"
          git tag "v$VERSION-release"
          git push origin "v$VERSION-release"
          gh release edit "v$VERSION-pre-release" \
            --tag "v$VERSION-release" \
            --title "v$VERSION (Release)" \
            --prerelease=false \
            --latest=false \
            --notes "Release version $VERSION"

  # Stage 3: Publish (Manual Approval Required, Public)
  publish:
    needs: [pre-release, release]
    runs-on: ubuntu-latest
    environment:
      name: publish
      url: https://github.com/${{ github.repository }}/packages
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Promote to Final Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.pre-release.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release edit "v$VERSION-release" \
            --tag "v$VERSION" \
            --title "v$VERSION" \
            --notes "Publish version $VERSION" \
            --prerelease=false \
            --latest