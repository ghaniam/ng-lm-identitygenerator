name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.nbgv.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln

      - name: Build solution
        run: dotnet build ng-lm-identitygenerator.sln --configuration ${{ inputs.build_configuration || 'Release' }} --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/NG.LM.IdentityGenerator.Core/bin/${{ inputs.build_configuration || 'Release' }}/
            src/NG.LM.IdentityGenerator.Core/obj/
            src/NG.LM.IdentityGenerator.Core.Tests/bin/${{ inputs.build_configuration || 'Release' }}/
            src/NG.LM.IdentityGenerator.Core.Tests/obj/
          retention-days: 1
          #include-hidden-files: true

  unit-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run unit tests
        run: dotnet test ng-lm-identitygenerator.sln --configuration ${{ inputs.build_configuration || 'Release' }} --verbosity normal --no-build

  parallel-simulated-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run simulated parallel test
        run: echo "Running simulated parallel tests..." && sleep 5 && echo "Simulated parallel tests completed."

  package:
    needs: [unit-test, parallel-simulated-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Create NuGet package
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration ${{ inputs.build_configuration || 'Release' }} --output package --no-build -p:PackageVersion=${{ needs.build.outputs.version }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: ng-lm-identitygenerator-github
          path: package/*.nupkg
          retention-days: 1
    
  publish:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Simulate
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: ng-lm-identitygenerator-github

      - name: Publish NuGet package
        run: echo "Simulating NuGet package publish..." && sleep 5 && echo "Simulated NuGet package publish completed."
        #run: dotnet nuget push package/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

