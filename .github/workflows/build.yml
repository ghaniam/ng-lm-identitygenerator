name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          SEMVER=$(nbgv get-version -v SemVer2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SEMVER=$SEMVER" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Update version.json
        if: github.event_name == 'push'
        run: |
          CURRENT_VERSION=$(jq -r '.version' version.json)
          NEW_VERSION="${{ steps.nbgv.outputs.SEMVER }}"
          # Strip pre-release tags for version.json (keep only major.minor or major.minor.patch)
          BASE_VERSION=$(echo $NEW_VERSION | sed -E 's/(-.*)//')
          
          if [ "$CURRENT_VERSION" != "$BASE_VERSION" ]; then
            jq --arg ver "$BASE_VERSION" '.version = $ver' version.json > version.json.tmp
            mv version.json.tmp version.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add version.json
            git commit -m "chore: update version to $BASE_VERSION [skip ci]" || echo "No changes to commit"
            git push || echo "Nothing to push"
          fi

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln

      - name: Build solution
        run: dotnet build ng-lm-identitygenerator.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ng-lm-identitygenerator.sln --configuration Release --no-build --verbosity normal

      - name: Create NuGet package
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration Release --output package --no-build -p:PackageVersion=${{ steps.nbgv.outputs.VERSION }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: ng-lm-identitygenerator-github
          path: package/*.nupkg
          retention-days: 1
 

