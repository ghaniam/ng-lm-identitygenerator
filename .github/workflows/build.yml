name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln

      - name: Build solution
        run: dotnet build ng-lm-identitygenerator.sln --configuration ${{ inputs.build_configuration || 'Release' }} --no-restore

  unit-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run unit tests
        run: dotnet test src/**/*.Tests.csproj --configuration ${{ inputs.build_configuration || 'Release' }} --verbosity normal --no-build

  parallel-simulated-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Run simulated parallel test
        run: echo "Running simulated parallel tests..." && sleep 5 && echo "Simulated parallel tests completed."

  package:
    needs: [unit-test, parallel-simulated-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln

      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Create NuGet package
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration ${{ inputs.build_configuration || 'Release' }} --output package -p:PackageVersion=$VERSION

      - name: Publish NuGet package
        run: dotnet nuget push package/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      # - name: Upload NuGet package
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ng-lm-identitygenerator-github
      #     path: package/*.nupkg
      #     retention-days: 1
    
  publish-to-pre_release:
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Simulate
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # - name: Download NuGet package
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: ng-lm-identitygenerator-github

      - name: Publish NuGet package
        run: echo "Simulating NuGet package publish to PRE-RELEASE..." && sleep 5 && echo "Simulated NuGet package publish completed."
        #run: dotnet nuget push package/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

