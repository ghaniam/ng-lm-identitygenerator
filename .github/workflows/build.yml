name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln

      - name: Build solution
        run: dotnet build ng-lm-identitygenerator.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ng-lm-identitygenerator.sln --configuration Release --no-build --verbosity normal

      - name: Create NuGet package
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration Release --output package --no-build -p:PackageVersion=${{ steps.nbgv.outputs.VERSION }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: ng-lm-identitygenerator-github
          path: package/*.nupkg
          retention-days: 1
 

