name: Build and Scan dependencies

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln
          
      - name: Check for vulnerable NuGet packages
        run: |
          echo "Checking for vulnerable NuGet packages..."
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-output.txt
          if grep -q "has the following vulnerable packages" vuln-output.txt; then
            echo "❌ Vulnerable packages detected!"
            exit 1
          else
            echo "✅ No vulnerable packages found"
          fi

      - name: Build solution
        run: dotnet build ng-lm-identitygenerator.sln --configuration ${{ env.CONFIGURATION }} --no-restore

  unit-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run unit tests
        run: dotnet test src/**/*.Tests.csproj --configuration ${{ env.CONFIGURATION }} --verbosity normal --no-build

  parallel-simulated-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Run simulated parallel test
        run: echo "Running simulated parallel tests"

  package:
    needs: [unit-test, parallel-simulated-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ng-lm-identitygenerator.sln

      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Create NuGet package
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration ${{ env.CONFIGURATION }} --output package -p:PackageVersion=${{ steps.nbgv.outputs.VERSION }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./package/*.nupkg
          retention-days: 1