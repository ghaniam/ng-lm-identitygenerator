name: Publish to Azure Artifacts

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for versioning
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
      
      - name: Install Nerdbank.GitVersioning
        run: dotnet tool install --global nbgv

      - name: Determine version
        id: nbgv
        run: |
          VERSION=$(nbgv get-version -v NuGetPackageVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version will be: $VERSION"

      - name: Pack
        run: dotnet pack src/NG.LM.IdentityGenerator.Core/NG.LM.IdentityGenerator.Core.csproj --configuration ${{ inputs.build_configuration }} --output package -p:PackageVersion=${{ steps.nbgv.outputs.VERSION }}

      - name: Publish to Azure Artifacts
        run: |
          dotnet nuget add source ${{ secrets.AZURE_ARTIFACTS_URL }} \
            --name AzureArtifacts \
            --username Github \
            --password ${{ secrets.AZURE_ARTIFACTS_PAT }} \
            --store-password-in-clear-text
          dotnet nuget push package/*.nupkg --source AzureArtifacts --api-key az --skip-duplicate